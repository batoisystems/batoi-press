name: Publish release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish release package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zip
          coverage: none

      - name: Check PHP syntax
        run: find public_html radpress tools -name '*.php' -print0 | xargs -0 -n 1 php -l

      - name: Run smoke test
        run: php radpress/tests/smoke.php

      - name: Run update test
        run: php radpress/tests/update_runner.php

      - name: Run theme, asset, security, and export tests
        run: |
          php radpress/tests/asset_library.php
          php radpress/tests/media_assets.php
          php radpress/tests/security_baseline.php
          php radpress/tests/role_access.php
          php radpress/tests/post_ownership.php
          php radpress/tests/theme_template_syntax.php
          php radpress/tests/theme_branding.php
          php radpress/tests/static_export.php

      - name: Build release package
        run: php tools/build-release.php

      - name: Generate update manifest
        run: php tools/generate-release-manifest.php

      - name: Resolve release version
        id: release
        run: |
          php -r '$config = json_decode(file_get_contents("radpress/config/update.json"), true); echo "version=" . $config["current_version"] . PHP_EOL;' >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batoi-press-${{ steps.release.outputs.version }}
          path: |
            dist/batoi-press-${{ steps.release.outputs.version }}.zip
            dist/latest.json
          if-no-files-found: error

      - name: Check website deployment configuration
        id: deployment
        env:
          DEPLOY_HOST: ${{ secrets.BATOI_WWW_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.BATOI_WWW_DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.BATOI_WWW_DEPLOY_PORT }}
          DEPLOY_KEY: ${{ secrets.BATOI_WWW_DEPLOY_KEY }}
          DEPLOY_PATH: ${{ secrets.BATOI_WWW_DEPLOY_PATH }}
        run: |
          if test -n "$DEPLOY_HOST" \
            && test -n "$DEPLOY_USER" \
            && test -n "$DEPLOY_PORT" \
            && test -n "$DEPLOY_KEY" \
            && test -n "$DEPLOY_PATH"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Website deployment skipped because BATOI_WWW_DEPLOY_* secrets are not fully configured. Release artifacts remain available from this workflow and the GitHub release."
          {
            echo "### Website deployment skipped"
            echo
            echo "Configure all documented \`BATOI_WWW_DEPLOY_*\` repository secrets to publish the manifest and ZIP to batoi.com automatically."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure SSH
        if: steps.deployment.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.BATOI_WWW_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.BATOI_WWW_DEPLOY_PORT }}
          DEPLOY_KEY: ${{ secrets.BATOI_WWW_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/batoi_www_deploy
          chmod 600 ~/.ssh/batoi_www_deploy
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy release files
        if: steps.deployment.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.BATOI_WWW_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.BATOI_WWW_DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.BATOI_WWW_DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.BATOI_WWW_DEPLOY_PATH }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          ssh -i ~/.ssh/batoi_www_deploy -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/public_html/pub/press/releases'"
          scp -i ~/.ssh/batoi_www_deploy -P "$DEPLOY_PORT" "dist/latest.json" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/public_html/pub/press/latest.json"
          scp -i ~/.ssh/batoi_www_deploy -P "$DEPLOY_PORT" "dist/batoi-press-$VERSION.zip" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/public_html/pub/press/releases/batoi-press-$VERSION.zip"
